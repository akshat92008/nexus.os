version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-db:
    image: supabase/postgres:15.4.0
    container_name: nexus_supabase_db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-gotrue:
    image: supabase/gotrue:latest
    container_name: nexus_supabase_gotrue
    depends_on:
      - supabase-db
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@supabase-db:5432/postgres
      GOTRUE_JWT_SECRET: supabase-jwt-secret
      GOTRUE_SITE_URL: http://localhost:54321
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
    ports:
      - '9999:9999'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-postgrest:
    image: supabase/postgrest:latest
    container_name: nexus_supabase_postgrest
    depends_on:
      - supabase-db
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: supabase-jwt-secret
      PGRST_SERVER_PORT: 3000
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  supabase-proxy:
    image: nginx:stable-alpine
    container_name: nexus_supabase_proxy
    depends_on:
      - supabase-gotrue
      - supabase-postgrest
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '54321:54321'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54321/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nexus_api
    depends_on:
      - redis
      - supabase-proxy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-proxy:54321}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,tauri://localhost,https://tauri.localhost}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - '3001:3001'
    stdin_open: true
    tty: true

volumes:
  supabase_db_data:
    name: nexus_supabase_db_data
