services:
  api:
    build: ./apps/api
    ports:
      - '3006:3006'
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./apps/api/src:/app/src

  web:
    build: ./apps/web
    ports:
      - '3000:3000'
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  redis_data:
