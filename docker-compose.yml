version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: nexus_network
