name: Continuous Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: GitHub Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Build and Push Images
        env:
          PROJECT_ID: nexus-493706
          REGION: us-central1
          REPOSITORY: nexus-repo
        run: |
          # 1. Build & Push API
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-api:latest -f apps/api/Dockerfile.production .
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-api:latest

          # 2. Build & Push Web
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-web:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://nexus-api-z5eeurxruq-uc.a.run.app \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -f apps/web/Dockerfile .
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-web:latest

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: nexus-493706
          REGION: us-central1
          REPOSITORY: nexus-repo
        run: |
          # Deploy API
          gcloud run deploy nexus-api \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-api:latest \
            --region $REGION \
            --platform managed \
            --port 3001 \
            --set-env-vars="NODE_ENV=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},JWT_SECRET=${{ secrets.JWT_SECRET }}"

          # Deploy Web
          gcloud run deploy nexus-web \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/nexus-web:latest \
            --region $REGION \
            --platform managed \
            --port 3000 \
            --set-env-vars="NEXT_PUBLIC_API_URL=https://nexus-api-z5eeurxruq-uc.a.run.app,NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
