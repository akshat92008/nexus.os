<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nexus OS</title>
  <style>
    body { width: 320px; padding: 16px; font-family: -apple-system, system-ui; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .header h1 { margin: 0; font-size: 18px; }
    .status { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; }
    .status.connected { background: #dcfce7; color: #166534; }
    .status.disconnected { background: #fee2e2; color: #991b1b; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .shortcut { font-size: 11px; color: #6b7280; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Nexus OS</h1>
  </div>
  <div id="status" class="status disconnected">Connecting...</div>
  <button class="btn btn-primary" id="sendPage">Send Page to Nexus</button>
  <button class="btn btn-secondary" id="askNexus">Ask About This Page</button>
  <button class="btn btn-secondary" id="openDashboard">Open Dashboard</button>
  <div class="shortcut">Shortcuts: Cmd+Shift+N (send) · Cmd+Shift+A (ask)</div>

  <script src="popup.js"></script>
</body>
</html>
