services:
  - type: web
    name: nexus-os-platform
    env: node
    region: oregon
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @nexus-os/types build && pnpm --filter @nexus-os/api build"
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: SUPABASE_URL
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: SUPABASE_SERVICE_KEY
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: SUPABASE_ANON_KEY
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: OPENROUTER_API_KEY
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: GROQ_API_KEY
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: GEMINI_API_KEY
        value: "REPLACEME_IN_RENDER_DASHBOARD"
      - key: APP_URL
        value: "https://nexus-os.vercel.app"
      - key: REDIS_URL
        value: "REPLACEME_IN_RENDER_DASHBOARD"
