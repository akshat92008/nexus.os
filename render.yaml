envVarGroups:
  - name: nexus-shared-secrets
    envVars:
      - key: SUPABASE_URL
        sync: true
      - key: SUPABASE_SERVICE_KEY
        sync: true
      - key: SUPABASE_ANON_KEY
        sync: true
      - key: OPENROUTER_API_KEY
        sync: true
      - key: GROQ_API_KEY
        sync: true
      - key: GEMINI_API_KEY
        sync: true
      - key: APP_URL
        sync: true
      - key: REDIS_URL
        sync: true
      - key: STRIPE_SECRET_KEY
        sync: true
      - key: STRIPE_WEBHOOK_SECRET
        sync: true
      - key: STRIPE_PRICE_ID_PRO
        sync: true
      - key: STRIPE_PRICE_ID_ENTERPRISE
        sync: true

services:
  - type: web
    name: nexus-api
    env: node
    region: oregon
    plan: starter
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @nexus-os/types build && pnpm --filter @nexus-os/api build"
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - fromGroup: nexus-shared-secrets

  - type: worker
    name: nexus-task-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @nexus-os/types build && pnpm --filter @nexus-os/api build"
    startCommand: node apps/api/dist/workers/taskWorker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - fromGroup: nexus-shared-secrets
