services:
  - type: web
    name: nexus-api
    env: node
    buildCommand: pnpm install && pnpm --filter @nexus-os/api build
    startCommand: pnpm --filter @nexus-os/api start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3006
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: production
