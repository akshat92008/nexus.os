steps:
  # 1. Verify source sync (Ensures we have the skeleton for lockfile validation)
  - name: 'alpine'
    args: ['ls', '-R', 'apps/api', 'apps/web/package.json', 'packages/types']

  # 2. Build the API container using the root context (Required for monorepo dependencies)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nexus-brain', '-f', 'apps/api/Dockerfile', '.']

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nexus-brain']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexus-brain'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nexus-brain'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--set-env-vars'
      - 'NODE_ENV=production,PORT=8080,NEXUS_MODE=cloud'

images:
  - 'gcr.io/$PROJECT_ID/nexus-brain'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
