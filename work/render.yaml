# Nexus OS — Render.com Deployment (Free Tier)
# Task 21: All services on free tier, Upstash Redis (not Render Redis which is paid)
#
# Setup order:
#  1. Create Upstash Redis at https://upstash.com (free tier)
#  2. Copy the ioredis connection string into REDIS_URL below
#  3. Connect your GitHub repo to Render and select this file

services:
  - type: web
    name: nexus-api
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @nexus-os/types build && pnpm --filter @nexus-os/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: REDIS_URL
        sync: false          # Set in Render dashboard — use Upstash ioredis URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
      - key: APP_URL
        sync: false

  - type: worker
    name: nexus-task-worker
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @nexus-os/types build && pnpm --filter @nexus-os/api build
    startCommand: node apps/api/dist/workers/taskWorker.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_URL
        sync: false

# NOTE: Do NOT add a Render Redis service here — it is a paid add-on.
# Use Upstash Redis free tier instead: https://upstash.com
# The ioredis connection string looks like:
#   rediss://default:<password>@<host>.upstash.io:6379
